<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afmeld nyhedsmail — SmartPack</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f7f4;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      text-align: center;
    }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    input[type=email] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: #f9fafb;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=email]:focus { border-color: #2D6A4F; }
    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-red { background: #dc2626; color: #fff; }
    .btn-red:hover { background: #b91c1c; }
    .btn-red:disabled { background: #9ca3af; cursor: not-allowed; }
    .msg {
      border-radius: 0.5rem;
      padding: 0.9rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .msg-ok  { background: #dcfce7; color: #166534; }
    .msg-err { background: #fee2e2; color: #991b1b; }
    .back { margin-top: 1.5rem; font-size: 0.8rem; }
    .back a { color: #2D6A4F; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📧</div>
    <h1>Afmeld nyhedsmail</h1>
    <p>Indtast din e-mail for at stoppe med at modtage nyheder fra SmartPack.</p>

    <div id="msg" class="msg" style="display:none"></div>

    <form id="form">
      <input type="email" id="email" placeholder="din@email.dk" required autocomplete="email">
      <button type="submit" class="btn-red" id="btn">Afmeld nyhedsmail</button>
    </form>

    <div class="back">
      <a href="/lagerdesigner/">← Tilbage til lagerdesigneren</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://midtkaplyhxhrdtujmda.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TMt9jbZhbV8KzrvDUA7kuA_RXZW4mwE';

    async function unsubscribe(email) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/newsletter_subscribers?email=eq.${encodeURIComponent(email.toLowerCase())}&unsubscribed=eq.false`,
        {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation',
          },
          body: JSON.stringify({ unsubscribed: true, unsubscribed_at: new Date().toISOString() }),
        }
      );
      const data = await res.json();
      return Array.isArray(data) ? data.length > 0 : false;
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');

      btn.disabled = true;
      btn.textContent = 'Afmelder...';
      msg.style.display = 'none';

      try {
        const found = await unsubscribe(email);
        msg.style.display = 'block';
        if (found) {
          msg.className = 'msg msg-ok';
          msg.textContent = '\u2705 Du er nu afmeldt. Vi sender dig ikke flere nyhedsmail.';
          document.getElementById('form').style.display = 'none';
        } else {
          msg.className = 'msg msg-err';
          msg.textContent = 'Vi kunne ikke finde den e-mail \u2014 er du sikker p\u00e5 den er rigtig?';
          btn.disabled = false;
          btn.textContent = 'Afmeld nyhedsmail';
        }
      } catch (err) {
        msg.style.display = 'block';
        msg.className = 'msg msg-err';
        msg.textContent = 'Noget gik galt. Pr\u00f8v igen eller skriv til os p\u00e5 smartpack.dk.';
        btn.disabled = false;
        btn.textContent = 'Afmeld nyhedsmail';
      }
    });
  </script>
</body>
</html>
