<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afmeld nyhedsmail - SmartPack</title>
  <link rel="icon" href="/favicon-smartpack0.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/theme-toggle.js"></script>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { margin:0; overflow:hidden; }
    .unsubscribe-card {
      background: var(--card-bg, #fff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      text-align: center;
    }
    .unsubscribe-card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .unsubscribe-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    .unsubscribe-card p { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    .unsubscribe-card input[type=email] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: #f9fafb;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .unsubscribe-card input[type=email]:focus { border-color: #2D6A4F; }
    .btn-red {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      background: #dc2626;
      color: #fff;
      transition: background 0.15s;
    }
    .btn-red:hover { background: #b91c1c; }
    .btn-red:disabled { background: #9ca3af; cursor: not-allowed; }
    .msg {
      border-radius: 0.5rem;
      padding: 0.9rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .msg-ok  { background: #dcfce7; color: #166534; }
    .msg-err { background: #fee2e2; color: #991b1b; }
    .back { margin-top: 1.5rem; font-size: 0.8rem; }
    .back a { color: #2D6A4F; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Overlay baggrund -->
  <div id="overlay-backdrop" style="
    position:fixed;inset:0;z-index:999;
    background:rgba(15,23,42,0.75);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;padding:1rem;
  ">
    <div class="unsubscribe-card" style="position:relative">
      <!-- Luk-knap -->
      <button onclick="history.length>1?history.back():location.href='/'" style="
        position:absolute;top:0.75rem;right:0.75rem;
        background:none;border:none;font-size:1.4rem;cursor:pointer;
        color:#9ca3af;line-height:1;width:auto;padding:0;
      " title="Luk">&times;</button>

      <div class="icon">📧</div>
      <h1>Afmeld nyhedsmail</h1>
      <p>Indtast din e-mail for at stoppe med at modtage nyheder fra SmartPack.</p>

      <div id="msg" class="msg" style="display:none"></div>

      <form id="form">
        <input type="email" id="email" placeholder="din@email.dk" required autocomplete="email">
        <button type="submit" class="btn-red" id="btn">Afmeld nyhedsmail</button>
      </form>

      <div class="back" style="margin-top:1rem">
        <a href="/">Tilbage til SmartPack</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://midtkaplyhxhrdtujmda.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TMt9jbZhbV8KzrvDUA7kuA_RXZW4mwE';

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const btn   = document.getElementById('btn');
      const msg   = document.getElementById('msg');

      btn.disabled    = true;
      btn.textContent = 'Afmelder...';
      msg.style.display = 'none';

      try {
        // GDPR: slet rækken fuldstændigt frem for soft-delete
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/newsletter_subscribers?email=eq.${encodeURIComponent(email)}`,
          {
            method: 'DELETE',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Prefer': 'count=exact',
            },
          }
        );
        const data = await res.json();
        const found = Array.isArray(data) && data.length > 0;

        msg.style.display = 'block';
        if (found) {
          msg.className = 'msg msg-ok';
          msg.textContent = '\u2705 Du er nu afmeldt. Vi sender dig ikke flere nyhedsmail.';
          document.getElementById('form').style.display = 'none';
        } else {
          msg.className = 'msg msg-err';
          msg.textContent = 'Vi kunne ikke finde den e-mail. Er du sikker p\u00e5 den er rigtig?';
          btn.disabled    = false;
          btn.textContent = 'Afmeld nyhedsmail';
        }
      } catch (err) {
        msg.style.display = 'block';
        msg.className     = 'msg msg-err';
        msg.textContent   = 'Noget gik galt. Pr\u00f8v igen eller skriv til os p\u00e5 support@smartpack.dk.';
        btn.disabled      = false;
        btn.textContent   = 'Afmeld nyhedsmail';
      }
    });
  </script>
</body>
</html>
