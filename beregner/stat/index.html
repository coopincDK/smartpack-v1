<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beregner statistik</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .gate { background: #fff; border-radius: 12px; padding: 32px; max-width: 360px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.1); text-align: center; }
  .gate h2 { font-size: 1.1rem; color: #1a3d2b; margin-bottom: 8px; }
  .gate p { color: #888; font-size: .85rem; margin-bottom: 20px; }
  .gate input { width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 1rem; text-align: center; letter-spacing: .2em; outline: none; }
  .gate input:focus { border-color: #1a5c35; }
  .gate .err { color: #dc2626; font-size: .8rem; margin-top: 8px; display: none; }

  .stats { background: #fff; border-radius: 12px; padding: 28px; max-width: 560px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.1); display: none; }
  .stats h1 { font-size: 1.1rem; color: #1a3d2b; margin-bottom: 4px; }
  .stats .sub { color: #888; font-size: .8rem; margin-bottom: 24px; }
  .week-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .week-label { font-size: .8rem; color: #555; width: 80px; flex-shrink: 0; }
  .week-bar-wrap { flex: 1; background: #f0f4f0; border-radius: 4px; height: 22px; overflow: hidden; }
  .week-bar { height: 100%; background: #1a5c35; border-radius: 4px; transition: width .5s ease; min-width: 2px; }
  .week-count { font-size: .82rem; font-weight: 700; color: #1a3d2b; width: 32px; text-align: right; flex-shrink: 0; }
  .total { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e5e7eb; font-size: .85rem; color: #555; }
  .total strong { color: #1a3d2b; }
  .loading { color: #888; font-size: .85rem; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div class="gate" id="gate">
  <h2>🔐 Statistik</h2>
  <p>Indtast kode for at se besøgstal</p>
  <input type="password" id="codeInput" placeholder="····" maxlength="8" oninput="checkCode(this.value)" autofocus>
  <div class="err" id="codeErr">Forkert kode</div>
</div>

<div class="stats" id="stats">
  <h1>📊 Besøg på /beregner/</h1>
  <div class="sub">Ugentlig oversigt &middot; Seneste 60 uger</div>
  <div id="chartArea"><div class="loading">Henter data...</div></div>
  <div class="total" id="totalArea"></div>
</div>

<script>
const CODE = '1337';

function checkCode(val) {
  if (val === CODE) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('stats').style.display = 'block';
    loadStats();
  } else if (val.length >= CODE.length) {
    document.getElementById('codeErr').style.display = 'block';
  } else {
    document.getElementById('codeErr').style.display = 'none';
  }
}

function getWeeks(n) {
  const weeks = [];
  const now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i * 7);
    const du = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    du.setUTCDate(du.getUTCDate() + 4 - (du.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(du.getUTCFullYear(), 0, 1));
    const week = Math.ceil((((du - yearStart) / 86400000) + 1) / 7);
    weeks.push({ key: `beregner-${du.getUTCFullYear()}-W${String(week).padStart(2,'0')}`, label: `Uge ${week}` });
  }
  return weeks;
}

async function loadStats() {
  const weeks = getWeeks(60);
  const results = await Promise.all(
    weeks.map(w =>
      fetch(`https://api.countapi.xyz/get/smartpack-dk/${w.key}`)
        .then(r => r.json())
        .then(d => ({ ...w, count: d.value || 0 }))
        .catch(() => ({ ...w, count: 0 }))
    )
  );

  const max = Math.max(...results.map(r => r.count), 1);
  const total = results.reduce((a, r) => a + r.count, 0);

  const chart = document.getElementById('chartArea');
  chart.innerHTML = results.map(r => `
    <div class="week-row">
      <div class="week-label">${r.label}</div>
      <div class="week-bar-wrap"><div class="week-bar" style="width:${Math.round(r.count/max*100)}%"></div></div>
      <div class="week-count">${r.count}</div>
    </div>
  `).join('');

  document.getElementById('totalArea').innerHTML =
    `Total seneste 60 uger: <strong>${total} besøg</strong>`;
}
</script>
</body>
</html>
