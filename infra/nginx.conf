worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80 default_server;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Use relative redirects — host nginx terminates SSL, so we don't know
        # the public scheme. Browser keeps current scheme/host on relative 301.
        absolute_redirect off;

        # Redirect /foo.html → /foo (preserves query string)
        location ~ ^(?<noext>/.+)\.html$ {
            return 301 $noext$is_args$args;
        }

        # Real client IP from upstream nginx on host
        set_real_ip_from 172.16.0.0/12;
        real_ip_header X-Forwarded-For;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Long-lived assets
        location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|css|js|mjs|woff|woff2|ttf|otf|mp4|webm)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
            try_files $uri =404;
        }

        # HTML — short cache, allow revalidation
        location ~* \.html$ {
            add_header Cache-Control "public, max-age=300, must-revalidate";
            try_files $uri =404;
        }

        # Healthcheck endpoint
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Clean URLs: /priser → /priser.html, etc.
        location / {
            try_files $uri $uri.html $uri/index.html $uri/ =404;
        }

        # Custom error pages
        error_page 403 /403.html;
        error_page 404 /404.html;
    }
}
