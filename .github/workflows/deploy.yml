name: Deploy med contact token

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  inject-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_DISPATCH_TOKEN }}

      - name: Injicér contact-config.js med token fra Secrets
        run: |
          echo "window._spcovGhToken = '${{ secrets.GH_DISPATCH_TOKEN }}';" > js/contact-config.js
          git config user.name  "SmartPack Deploy Bot"
          git config user.email "deploy@smartpack.dk"
          git add js/contact-config.js
          git diff --cached --quiet || git commit -m "chore: inject contact token [skip ci]"
          git push
